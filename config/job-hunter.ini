; ═══════════════════════════════════════════════════════════════
; Job Hunter — Shared Configuration
; Country-specific settings are in config/country-{code}.ini
; ═══════════════════════════════════════════════════════════════

[general]
; Max search result pages per platform per query
max_pages_per_platform = 2
; Delay between scraping requests (seconds)
request_delay_seconds = 3
; Only show jobs posted within this many days
days_since_posted = 14

[reputation]
; Company reputation lookup settings
enabled = 1
; Minimum review count to consider rating credible
min_reviews_credible = 10

[parsing]
; local = Client-side parsing by the agent (no extra credits)
; remote = Server-side parsing via parse_jobs MCP tool (recommended, uses credits)
parsing_mode = remote

[scoring]
; local = Local heuristic scoring (no DEB Cloud needed)
; remote = server-side scoring via score_jobs MCP tool (DEB Cloud)
scoring_mode = remote

[platforms]
; Priority-ordered default platforms (max 5 active at a time)
default = indeed, linkedin, reed, totaljobs, adzuna
; Free plan defaults to 3 platforms + 1 keyword to preserve credits
free = indeed, linkedin, reed
free_max_keywords = 1

[enrichment]
; Enable JD enrichment (scrape + parse job descriptions)
enabled = 1
; Free plan: cap enrichment to preserve credits (0 = no cap)
free_max_enrich = 250
; Listing score threshold for first-layer filter (0-100)
filter_threshold = 40

[output]
; pipeline = Rich terminal output with progress bars, per-worker status, credits
; standard = Standard Claude output (no specific formatting)
terminal_mode = pipeline

[deb_cloud]
; DEB Cloud API key environment variable name
api_key_env = DEB_CLOUD_API_KEY
