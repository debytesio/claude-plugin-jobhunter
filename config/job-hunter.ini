; ═══════════════════════════════════════════════════════════════
; Job Hunter — Shared Configuration
; Country-specific settings are in config/country-{code}.ini
; ═══════════════════════════════════════════════════════════════

[general]
; Max search result pages per platform per query
max_pages_per_platform = 2
; Delay between scraping requests (seconds)
request_delay_seconds = 3
; Only show jobs posted within this many days
days_since_posted = 14

[reputation]
; Company reputation lookup settings
enabled = 1
; Minimum review count to consider rating credible
min_reviews_credible = 10

[scoring]
; local = Local heuristic scoring (no DEB Cloud needed)
; remote = server-side scoring via score_jobs MCP tool (DEB Cloud)
scoring_mode = remote

[deb_cloud]
; DEB Cloud API key environment variable name
api_key_env = DEB_CLOUD_API_KEY
